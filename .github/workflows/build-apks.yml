name: Build APKs

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug & Release APK
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        SAMECHAT_GH_TOKEN: ${{ secrets.SAMECHAT_GH_TOKEN }}
      run: ./gradlew assembleDebug assembleRelease

    - name: Upload APKs
      id: upload-apks
      uses: actions/upload-artifact@v4
      with:
        name: somechat-apks
        path: app/build/outputs/apk/**/*.apk

    - name: Display Artifact URL
      run: |
        echo "### Build Artifacts 📦" >> $GITHUB_STEP_SUMMARY
        echo "The APKs have been successfully built and are available for download:" >> $GITHUB_STEP_SUMMARY
        echo "* [Download SomeChat APKs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY
