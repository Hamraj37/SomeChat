name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

- name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Prepare local.properties and Google Services
      run: |
        echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" > local.properties
        echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> local.properties
        echo "RELEASE_KEYSTORE_BASE64=${{ secrets.RELEASE_KEYSTORE_BASE64 }}" >> local.properties
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

    # Added step: Write the raw JSON secret into the app directory
    
    - name: Create google-services.json
      env:
        GOOGLE_SERVICES_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        echo "$GOOGLE_SERVICES_CONTENT" > app/google-services.json


    # Now this will succeed because the file is exactly where Gradle expects it
    - name: Build with Gradle
      run: ./gradlew assembleDebug assembleRelease

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: app-apks
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
