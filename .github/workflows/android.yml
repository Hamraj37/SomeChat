name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Get Release Info
      id: release_info
      run: |
        VERSION_NAME=$(grep "versionName" app/build.gradle | awk -F '"' '{print $2}')
        # Get the previous tag, if it exists
        LAST_TAG=$(git tag --sort=-v:refname | head -n 1)
        
        if [ -z "$LAST_TAG" ]; then
          echo "No previous tag found, fetching all commits."
          COMMITS=$(git log --pretty=format:"* %s")
        else
          echo "Previous tag: $LAST_TAG"
          COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"* %s")
        fi
        
        # If COMMITS is empty (e.g. HEAD is at LAST_TAG), just get the last commit
        if [ -z "$COMMITS" ]; then
          COMMITS=$(git log -1 --pretty=format:"* %s")
        fi
        
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "### Changes in this release" >> $GITHUB_OUTPUT
        echo "$COMMITS" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK & Bundle
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        SAMECHAT_GH_TOKEN: ${{ secrets.SAMECHAT_GH_TOKEN }}
      run: ./gradlew assembleRelease bundleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk

    - name: Upload Release Bundle
      uses: actions/upload-artifact@v4
      with:
        name: release-bundle
        path: app/build/outputs/bundle/release/*.aab

    - name: Create Release
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        name: Release v${{ steps.release_info.outputs.VERSION_NAME }}
        tag_name: v${{ steps.release_info.outputs.VERSION_NAME }}
        body: ${{ steps.release_info.outputs.CHANGELOG }}
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/bundle/release/*.aab
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
